<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숨결교회</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Pretendard, sans-serif;
  background:#f4efe6;
  color:#1a1815;
}
.wrap{
  width:min(1100px,100% - 20px);
  margin:0 auto;
  padding:20px 0;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.brand{
  font-size:28px;
  font-weight:900;
}
.nav a{
  margin-left:10px;
  padding:8px 12px;
  border:1px solid #1a1815;
  border-radius:20px;
  font-weight:700;
}
.poster{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  background:#fffaf1;
  border:2px solid #1a1815;
}
.poster-left{
  padding:40px;
  border-right:2px solid #1a1815;
}
.poster-left h1{
  font-size:80px;
  line-height:.9;
  margin:20px 0;
}
.poster-left p{
  color:#555;
  line-height:1.7;
}
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 18px;
  border:2px solid #1a1815;
  font-weight:800;
}
.poster-right{
  display:flex;
  flex-direction:column;
}
.box{
  padding:20px;
  border-bottom:2px solid #1a1815;
}
.box:last-child{border-bottom:0}
.time{
  font-size:40px;
  font-weight:900;
}
section{
  margin-top:20px;
  border:2px solid #1a1815;
  background:#fffaf1;
}
.sec{
  padding:30px;
}
h2{
  font-size:40px;
  margin-bottom:10px;
}
.row{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  border-top:1px solid #ccc;
}
footer{
  margin-top:20px;
  padding:20px;
  background:#1a1815;
  color:#fff;
  text-align:center;
}
@media(max-width:800px){
  .poster{grid-template-columns:1fr}
  .poster-left{
    border-right:0;
    border-bottom:2px solid #1a1815;
  }
  .poster-left h1{font-size:50px}
}
</style>
</head>

<body>

<div class="wrap">

<header class="header">
  <div class="brand">숨결교회</div>
  <nav class="nav">
    <a href="#about">소개</a>
    <a href="#worship">예배</a>
    <a href="#location">위치</a>
  </nav>
</header>

<main class="poster">
  <div class="poster-left">
    <h1>삶에<br>숨을<br>불어넣는 교회</h1>
    <p>
      숨결교회는 예배와 말씀을 통해
      삶이 회복되는 공동체입니다.
    </p>
    <a class="btn" href="#worship">예배 안내</a>
  </div>

  <div class="poster-right">
    <div class="box">
      <div>주일 예배</div>
      <div class="time">11:00</div>
    </div>

    <div class="box">
      <div>공지</div>
      <p>새가족 모임 안내</p>
      <p>수련회 신청</p>
    </div>

    <div class="box">
      <div>주소</div>
      <p>서울 은평구 123</p>
    </div>
  </div>
</main>

<section id="about">
  <div class="sec">
    <h2>교회소개</h2>
    <p>누구나 편안히 올 수 있는 공동체입니다.</p>
  </div>
</section>

<section id="worship">
  <div class="sec">
    <h2>예배안내</h2>
  </div>
  <div class="row"><span>주일</span><span>11:00</span></div>
  <div class="row"><span>수요</span><span>19:30</span></div>
</section>

<section id="location">
  <div class="sec">
    <h2>오시는 길</h2>
    <p>서울특별시 은평구 은혜로 123</p>
  </div>
</section>

<footer>
  숨결교회 © 2026
</footer>

</div>

</body>
</html>
